<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fractalium</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #141418;
            overflow: hidden;
            overscroll-behavior: none;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <canvas id="fractalium-canvas"></canvas>
    <link data-trunk rel="rust" data-cargo-features="webgl2" data-wasm-opt="z"/>
</body>
</html>
